<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            color: #1a2533;
            padding: 50px 20px;
        }

        .page {
            max-width: 720px;
            margin: auto;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .page-header {
            background: #0d4f6c;
            padding: 30px 40px;
            color: white;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .faculty-photo {
            width: 90px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .header-info h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-info .meta {
            font-size: 0.88rem;
            color: #a8d8ea;
            line-height: 1.8;
        }

        .header-info .meta span {
            display: block;
        }

        .page-title {
            background: #e8f4f8;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #0d4f6c;
            border-bottom: 2px solid #0d4f6c;
        }

        .page-body {
            padding: 28px 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: #e8f4f8;
            color: #0d4f6c;
            font-weight: 700;
            border-bottom: 2px solid #0d4f6c;
        }

        td {
            padding: 13px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f7fbfd; }

        td a {
            color: #0d7fa3;
            text-decoration: none;
            font-weight: 500;
        }

        td a:hover {
            color: #f59e0b;
            text-decoration: underline;
        }

        .quiz-link {
            display: inline-block;
            background: #f59e0b;
            color: white !important;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none !important;
            transition: background 0.2s;
        }

        .quiz-link:hover {
            background: #d97706 !important;
            color: white !important;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
